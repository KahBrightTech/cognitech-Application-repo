# Annotations Reference: https://kubernetes-sigs.github.io/aws-load-balancer-controller/latest/guide/ingress/annotations/
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.ingress.ingressname }}
  labels:
    app: {{ .Values.ingress.ingressname }}
  annotations:
    alb.ingress.kubernetes.io/load-balancer-name: {{ .Values.ingress.alb_name | quote }}
    alb.ingress.kubernetes.io/scheme: {{ .Values.ingress.scheme | quote }}
    alb.ingress.kubernetes.io/target-type: {{ .Values.ingress.target_type | quote }}
    # Shared with the api Ingress so both provision onto the same ALB.
    alb.ingress.kubernetes.io/group.name: {{ .Values.ingress.group_name | quote }}
    alb.ingress.kubernetes.io/group.order: '10'
    # Loops through all health check values
    {{- range $key, $value := .Values.ingress.healthcheck }}
    alb.ingress.kubernetes.io/{{ $key }}: {{ $value | quote }}
    {{- end }}
    alb.ingress.kubernetes.io/listen-ports: {{ .Values.ingress.listenning_ports | quote }}
    alb.ingress.kubernetes.io/certificate-arn: {{ .Values.ingress.alb_certificate_arn | quote }}
    # Real HTTP->HTTPS redirect action (not "ssl-redirect: '443'", which isn't
    # a recognized annotation for this controller). Referenced below via the
    # "ssl-redirect" backend + port.name: use-annotation on the first rule.
    alb.ingress.kubernetes.io/actions.ssl-redirect: '{"Type": "redirect", "RedirectConfig": {"Protocol": "HTTPS", "Port": "443", "StatusCode": "HTTP_301"}}'
    external-dns.alpha.kubernetes.io/hostname: {{ .Values.ingress.hostname | quote }}
spec:
  ingressClassName: {{ .Values.ingress.ingressclassname }}
  rules:
    - host: {{ .Values.ingress.hostname | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ssl-redirect
                port:
                  name: use-annotation
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.frontend.name }}
                port:
                  number: {{ .Values.frontend.service.port }}
    - host: {{ .Values.ingress.accounthostname | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ssl-redirect
                port:
                  name: use-annotation
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.frontend.name }}
                port:
                  number: {{ .Values.frontend.service.port }}
