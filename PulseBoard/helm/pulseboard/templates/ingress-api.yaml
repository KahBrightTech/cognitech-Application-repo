# Dedicated Ingress for direct backend/API access on port 4000. Shares the
# same ALB as ingress.yaml via group.name, but defines its own listener
# (4000) and rules - those stay scoped to this listener only, independent
# of the 80/443 rules on the frontend Ingress.
# Annotations Reference: https://kubernetes-sigs.github.io/aws-load-balancer-controller/latest/guide/ingress/annotations/
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.ingress.api.ingressname }}
  labels:
    app: {{ .Values.ingress.api.ingressname }}
  annotations:
    alb.ingress.kubernetes.io/load-balancer-name: {{ .Values.ingress.alb_name | quote }}
    alb.ingress.kubernetes.io/scheme: {{ .Values.ingress.scheme | quote }}
    alb.ingress.kubernetes.io/group.name: {{ .Values.ingress.group_name | quote }}
    {{- range $key, $value := .Values.ingress.healthcheck }}
    alb.ingress.kubernetes.io/{{ $key }}: {{ $value | quote }}
    {{- end }}
    alb.ingress.kubernetes.io/listen-ports: {{ .Values.ingress.api.listenning_ports | quote }}
spec:
  ingressClassName: {{ .Values.ingress.ingressclassname }}
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.backend.name }}
                port:
                  number: {{ .Values.backend.service.port }}
