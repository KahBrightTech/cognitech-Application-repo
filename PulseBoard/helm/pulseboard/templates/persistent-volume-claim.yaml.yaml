apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.global.storage.pvcName }}
  namespace: {{ .Values.global.namespace }}
spec:
  accessModes:
  - ReadWriteOnce 
  storageClassName: {{ .Values.global.storage.ClassName }} 
  resources:
    requests:
      storage: {{ .Values.global.storage.size }}
