# Frontend: Pod + NodePort Service.
# An initContainer waits for the backend's /health endpoint before nginx
# starts, so the pod won't crash on "host not found in upstream" and the
# backend is guaranteed to be up first.
apiVersion: v1
kind: Pod
metadata:
  name: pulseboard-frontend
  namespace: __NAMESPACE__
  labels:
    app: pulseboard
    component: frontend
spec:
  initContainers:
  - name: wait-for-backend
    image: busybox:1.36
    command:
    - sh
    - -c
    - |
      echo "Waiting for backend to become ready..."
      until wget -qO- http://pulseboard-backend:4000/health >/dev/null 2>&1; do
        echo "  backend not ready yet, retrying in 3s..."
        sleep 3
      done
      echo "✅ backend is up - starting frontend"
  containers:
  - name: frontend
    # Image is templated: __REGISTRY__ and __VERSION__ are injected by the
    # deploy-to-eks workflow from the ECR URL + version you choose.
    image: __REGISTRY__:pulseboard-frontend-__VERSION__
    imagePullPolicy: Always
    ports:
    - containerPort: 80
    readinessProbe:
      httpGet:
        path: /health
        port: 80
      initialDelaySeconds: 5
      periodSeconds: 10
    livenessProbe:
      httpGet:
        path: /health
        port: 80
      initialDelaySeconds: 10
      periodSeconds: 20
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: pulseboard-frontend
  namespace: __NAMESPACE__
  labels:
    app: pulseboard
    component: frontend
spec:
  type: NodePort
  selector:
    app: pulseboard
    component: frontend
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080 # access the UI at http://<node-external-ip>:30080
