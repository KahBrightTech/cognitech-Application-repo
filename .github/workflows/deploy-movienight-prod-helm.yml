name: Deploy MovieNight to Production (Helm)

on:
  push:
    branches:
      - main
    paths:
      - 'MovieNight/**'
  workflow_dispatch:
    inputs:
      confirm_production:
        description: 'Type "deploy-to-production" to confirm'
        required: true
        default: ''

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: int-production-use1-ecs
  EKS_CLUSTER_NAME: your-prod-eks-cluster  # Update this
  IAM_ROLE: arn:aws:iam::271457809232:role/int-prod-OIDCGitHubRole-role
  ENVIRONMENT: production

permissions:
  id-token: write
  contents: read

jobs:
  validate-input:
    name: Validate Production Deployment
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Check confirmation
        run: |
          if [ "${{ github.event.inputs.confirm_production }}" != "deploy-to-production" ]; then
            echo "❌ Production deployment not confirmed"
            exit 1
          fi
          echo "✅ Production deployment confirmed"

  build-and-deploy:
    name: Build and Deploy to Production
    runs-on: ubuntu-latest
    needs: [validate-input]
    if: always() && (needs.validate-input.result == 'success' || github.event_name == 'push')
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ env.IAM_ROLE }}
        role-session-name: GitHubActions-MovieNight-Prod-${{ github.run_id }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Get AWS Account ID
      id: account-id
      run: |
        echo "account_id=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_OUTPUT

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push backend image
      uses: docker/build-push-action@v5
      with:
        context: ./MovieNight/backend
        push: true
        tags: |
          ${{ steps.account-id.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:movienight-backend-${{ github.sha }}
          ${{ steps.account-id.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:movienight-backend-latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./MovieNight/frontend
        push: true
        tags: |
          ${{ steps.account-id.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:movienight-frontend-${{ github.sha }}
          ${{ steps.account-id.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:movienight-frontend-latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Install Helm
      uses: azure/setup-helm@v3
      with:
        version: 'latest'

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

    - name: Backup current release
      run: |
        helm get values movienight -n movienight > /tmp/previous-values.yaml || echo "No previous release"

    - name: Deploy with Helm
      run: |
        helm upgrade --install movienight ./MovieNight/helm/movienight \
          --namespace movienight \
          --create-namespace \
          --values ./MovieNight/helm/movienight/values-prod.yaml \
          --set backend.image.tag=movienight-backend-${{ github.sha }} \
          --set frontend.image.tag=movienight-frontend-${{ github.sha }} \
          --set secrets.tmdbApiKey=${{ secrets.TMDB_API_KEY }} \
          --wait \
          --timeout 15m \
          --atomic \
          --debug

    - name: Verify deployment
      run: |
        echo "=== Helm Release ==="
        helm list -n movienight
        echo ""
        echo "=== Deployment History ==="
        helm history movienight -n movienight
        echo ""
        echo "=== Pods ==="
        kubectl get pods -n movienight
        echo ""
        echo "=== Services ==="
        kubectl get svc -n movienight
        echo ""
        echo "=== Ingress ==="
        kubectl get ingress -n movienight

    - name: Run smoke tests
      run: |
        echo "Running smoke tests..."
        ALB_URL=$(kubectl get ingress movienight-ingress -n movienight -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
        
        # Test backend health
        echo "Testing backend health..."
        curl -f http://${ALB_URL}/api/health || exit 1
        
        # Test frontend
        echo "Testing frontend..."
        curl -f http://${ALB_URL}/ || exit 1
        
        echo "✅ Smoke tests passed!"

    - name: Get ALB URL
      run: |
        ALB_URL=$(kubectl get ingress movienight-ingress -n movienight -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
        echo "🍿 MovieNight Production deployed!"
        echo "🔗 Access URL: http://${ALB_URL}"
        echo "📊 Release: $(helm list -n movienight -o json | jq -r '.[0].chart')"
        echo "🚀 Revision: $(helm list -n movienight -o json | jq -r '.[0].revision')"

    - name: Rollback on failure
      if: failure()
      run: |
        echo "❌ Deployment failed! Rolling back..."
        helm rollback movienight -n movienight
