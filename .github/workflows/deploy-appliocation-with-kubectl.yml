name: Deploy application with kubectl

# =============================================================================
# Generic, reusable deploy-to-EKS workflow. Works for ANY app that keeps its
# Kubernetes manifests in a folder. It renders the manifests (injecting the
# chosen image version + namespace) and applies them to the cluster.
#
# It does NOT build images - it deploys a version already in ECR.
# Pod/Deployment ordering (e.g. backend before frontend) should be handled
# inside the manifests via initContainers or readiness probes.
# =============================================================================

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App name / image tag prefix, e.g. pulseboard'
        required: true
        type: string
        default: 'pulseboard'
      manifests_path:
        description: 'Folder containing the k8s manifests, e.g. PulseBoard/k8s'
        required: true
        type: string
        default: 'PulseBoard/k8s'
      namespace:
        description: 'Target namespace (must already exist)'
        required: true
        type: string
        default: 'pulseboard'
      version:
        description: 'Image version to deploy (e.g. v1.0.3) or "latest"'
        required: true
        type: string
        default: 'latest'
      image_registry:
        description: 'Full ECR image path (registry/repo), e.g. <acct>.dkr.ecr.<region>.amazonaws.com/<repo>'
        required: true
        type: string
        default: '271457809232.dkr.ecr.us-east-1.amazonaws.com/int-production-use1-ecs'
      include_backend:
        description: 'Deploy the backend component'
        required: false
        type: boolean
        default: true
      backend_tag:
        description: 'Explicit backend image tag (empty = derive <app>-backend-<version>)'
        required: false
        type: string
        default: ''
      include_frontend:
        description: 'Deploy the frontend component'
        required: false
        type: boolean
        default: true
      frontend_tag:
        description: 'Explicit frontend image tag (empty = derive <app>-frontend-<version>)'
        required: false
        type: string
        default: ''
      action:
        description: 'Deploy or delete'
        required: true
        type: choice
        options:
          - deploy
          - delete
        default: deploy
      aws_region:
        description: 'AWS region'
        required: false
        type: string
        default: 'us-east-1'
      ecr_repository:
        description: 'ECR repository name'
        required: false
        type: string
        default: 'int-production-use1-ecs'
      eks_cluster:
        description: 'Target EKS cluster name'
        required: false
        type: string
        default: 'int-production-use1-prod-novutech-eks-cluster'
      iam_role:
        description: 'IAM role ARN to assume via OIDC'
        required: false
        type: string
        default: 'arn:aws:iam::271457809232:role/int-prod-OIDCGitHubRole-role'

env:
  AWS_REGION: ${{ inputs.aws_region || 'us-east-1' }}
  ECR_REPOSITORY: ${{ inputs.ecr_repository || 'int-production-use1-ecs' }}
  EKS_CLUSTER_NAME: ${{ inputs.eks_cluster || 'int-production-use1-prod-novutech-eks-cluster' }}
  IAM_ROLE: ${{ inputs.iam_role || 'arn:aws:iam::271457809232:role/int-prod-OIDCGitHubRole-role' }}

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: ${{ inputs.action }} ${{ inputs.app_name }} ${{ inputs.version }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.IAM_ROLE }}
          role-session-name: GitHubActions-Deploy-${{ inputs.app_name }}-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name "${{ env.EKS_CLUSTER_NAME }}" --region "${{ env.AWS_REGION }}"

      # ----------------------------------------------------------------
      # Verify the requested images exist in ECR (deploy only)
      # ----------------------------------------------------------------
      - name: Verify images exist in ECR
        if: inputs.action == 'deploy'
        run: |
          check() {
            local TAG="$1"
            echo "🔍 Checking for tag: $TAG"
            aws ecr describe-images \
              --repository-name "${{ env.ECR_REPOSITORY }}" \
              --region "${{ env.AWS_REGION }}" \
              --image-ids imageTag="$TAG" >/dev/null 2>&1 \
              && echo "   ✅ Found $TAG" \
              || { echo "   ❌ $TAG not found in ECR. Build it first."; exit 1; }
          }
          if [ "${{ inputs.include_backend }}" == "true" ]; then
            BT="${{ inputs.backend_tag }}"; [ -z "$BT" ] && BT="${{ inputs.app_name }}-backend-${{ inputs.version }}"
            check "$BT"
          fi
          if [ "${{ inputs.include_frontend }}" == "true" ]; then
            FT="${{ inputs.frontend_tag }}"; [ -z "$FT" ] && FT="${{ inputs.app_name }}-frontend-${{ inputs.version }}"
            check "$FT"
          fi

      # ----------------------------------------------------------------
      # Render manifests: inject version + namespace, then apply
      # ----------------------------------------------------------------
      - name: Deploy
        if: inputs.action == 'deploy'
        run: |
          set -e
          NS="${{ inputs.namespace }}"
          VERSION="${{ inputs.version }}"
          REGISTRY="${{ inputs.image_registry }}"
          SRC="${{ inputs.manifests_path }}"
          APP="${{ inputs.app_name }}"

          if [ ! -d "$SRC" ]; then echo "❌ Manifests folder '$SRC' not found."; exit 1; fi

          # Only set an image tag for components that are included. Each tag
          # can be provided explicitly, or derived as <app>-<component>-<version>.
          BT=""; FT=""
          if [ "${{ inputs.include_backend }}" == "true" ]; then
            BT="${{ inputs.backend_tag }}"; [ -z "$BT" ] && BT="${APP}-backend-${VERSION}"
            echo "🧩 backend image tag: $BT"
          fi
          if [ "${{ inputs.include_frontend }}" == "true" ]; then
            FT="${{ inputs.frontend_tag }}"; [ -z "$FT" ] && FT="${APP}-frontend-${VERSION}"
            echo "🧩 frontend image tag: $FT"
          fi

          mkdir -p rendered
          echo "🧾 Rendering manifests from '$SRC' (registry=$REGISTRY, namespace=$NS)..."
          for f in $(find "$SRC" -type f \( -name '*.yaml' -o -name '*.yml' \) | sort); do
            # Which components does this file reference? (from <app>-<comp>-__VERSION__ image tokens)
            FILE_COMPS=$(grep -oE "${APP}-[a-zA-Z0-9_-]+-__VERSION__" "$f" 2>/dev/null \
              | sed -E "s/^${APP}-(.*)-__VERSION__$/\1/" | sort -u)

            # Shared manifests (no component image, e.g. configmap/namespace/ingress)
            # are always applied. Component manifests are applied only when
            # that component is included.
            if [ -n "$FILE_COMPS" ]; then
              KEEP_FILE=false
              for c in $FILE_COMPS; do
                [ "$c" == "backend" ] && [ "${{ inputs.include_backend }}" == "true" ] && KEEP_FILE=true
                [ "$c" == "frontend" ] && [ "${{ inputs.include_frontend }}" == "true" ] && KEEP_FILE=true
              done
              if [ "$KEEP_FILE" != "true" ]; then
                echo "⏭️  Skipping $(basename "$f") (components '$FILE_COMPS' not selected)"; continue
              fi
            fi

            # Build sed args: registry + namespace, then per-component tag,
            # then the generic __VERSION__ fallback.
            SED_ARGS=(-e "s#__REGISTRY__#${REGISTRY}#g" -e "s#__NAMESPACE__#${NS}#g")
            [ -n "$BT" ] && SED_ARGS+=(-e "s#${APP}-backend-__VERSION__#${BT}#g")
            [ -n "$FT" ] && SED_ARGS+=(-e "s#${APP}-frontend-__VERSION__#${FT}#g")
            SED_ARGS+=(-e "s#__VERSION__#${VERSION}#g")
            sed "${SED_ARGS[@]}" "$f" > "rendered/$(basename "$f")"
          done

          echo "🚀 Applying to namespace '$NS'..."
          kubectl apply -n "$NS" -f rendered/

          echo "⏳ Waiting for all pods in '$NS' to become Ready..."
          kubectl wait --for=condition=Ready pod --all -n "$NS" --timeout=300s || {
            echo "⚠️  Not all pods reported Ready in time. Current state:"; kubectl get pods -n "$NS" -o wide; exit 1;
          }

      # ----------------------------------------------------------------
      # Delete
      # ----------------------------------------------------------------
      - name: Delete
        if: inputs.action == 'delete'
        run: |
          set -e
          NS="${{ inputs.namespace }}"
          VERSION="${{ inputs.version }}"
          REGISTRY="${{ inputs.image_registry }}"
          SRC="${{ inputs.manifests_path }}"
          echo "🗑️  Deleting manifests in '$SRC' from namespace '$NS'..."
          # Image tags are irrelevant for deletion (resources match by kind/name),
          # so a plain generic render is enough here.
          mkdir -p rendered
          for f in $(find "$SRC" -type f \( -name '*.yaml' -o -name '*.yml' \) | sort); do
            sed -e "s#__REGISTRY__#${REGISTRY}#g" \
                -e "s#__VERSION__#${VERSION}#g" \
                -e "s#__NAMESPACE__#${NS}#g" \
                "$f" > "rendered/$(basename "$f")"
          done
          kubectl delete -n "$NS" -f rendered/ --ignore-not-found=true

      # ----------------------------------------------------------------
      # Status + summary
      # ----------------------------------------------------------------
      - name: Show status
        if: always()
        run: |
          NS="${{ inputs.namespace }}"
          echo "=== Pods ==="; kubectl get pods -n "$NS" -o wide || true
          echo "=== Services ==="; kubectl get svc -n "$NS" || true

      - name: Summary
        if: always()
        run: |
          {
            echo "## 🚀 Deploy to EKS: ${{ inputs.app_name }}"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Action | \`${{ inputs.action }}\` |"
            echo "| Version | \`${{ inputs.version }}\` |"
            echo "| Namespace | \`${{ inputs.namespace }}\` |"
            echo "| Manifests | \`${{ inputs.manifests_path }}\` |"
            echo "| Cluster | \`${{ env.EKS_CLUSTER_NAME }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
