name: Deploy MovieNight to Dev (Helm)

on:
  push:
    branches:
      - develop
    paths:
      - 'MovieNight/**'
      - '.github/workflows/movienight-dev.yml'
  workflow_dispatch:
    inputs:
      deployment_action:
        description: 'Deployment action'
        required: true
        type: choice
        options:
          - deploy
          - build-only
        default: 'deploy'

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: int-production-use1-ecs
  EKS_CLUSTER_NAME: int-production-use1-prod-novutech-eks-cluster
  K8S_NAMESPACE: movienight-dev
  IAM_ROLE: arn:aws:iam::271457809232:role/int-prod-OIDCGitHubRole-role
  ENVIRONMENT: dev

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    name: Build and Deploy to Dev
    runs-on: ubuntu-latest
    environment: development
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ env.IAM_ROLE }}
        role-session-name: GitHubActions-MovieNight-Dev-${{ github.run_id }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Get AWS Account ID
      id: account-id
      run: |
        echo "account_id=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_OUTPUT

    - name: Get latest dev version and auto-increment
      id: version
      run: |
        echo "🔍 Checking latest dev version in ECR..."
        
        # Get all dev version tags
        VERSIONS=$(aws ecr describe-images \
          --repository-name ${{ env.ECR_REPOSITORY }} \
          --region ${{ env.AWS_REGION }} \
          --query 'imageDetails[*].imageTags[]' \
          --output text | tr '\t' '\n' | grep -E '^movienight-backend-dev-v[0-9]+\.[0-9]+\.[0-9]+$' | sed 's/movienight-backend-dev-v//' || echo "")
        
        if [ -z "$VERSIONS" ]; then
          NEW_VERSION="v1.0.0"
          echo "📌 No previous dev versions. Starting with ${NEW_VERSION}"
        else
          LATEST_VERSION=$(echo "$VERSIONS" | sort -V | tail -n 1)
          echo "📌 Latest dev version: v${LATEST_VERSION}"
          
          MAJOR=$(echo $LATEST_VERSION | cut -d. -f1)
          MINOR=$(echo $LATEST_VERSION | cut -d. -f2)
          PATCH=$(echo $LATEST_VERSION | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="v${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "🚀 Auto-incrementing to: ${NEW_VERSION}"
        fi
        
        echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push backend image
      uses: docker/build-push-action@v5
      with:
        context: ./MovieNight/backend
        push: true
        tags: |
          ${{ steps.account-id.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:movienight-backend-dev-${{ steps.version.outputs.version }}
          ${{ steps.account-id.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:movienight-backend-dev-latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./MovieNight/frontend
        push: true
        tags: |
          ${{ steps.account-id.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:movienight-frontend-dev-${{ steps.version.outputs.version }}
          ${{ steps.account-id.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:movienight-frontend-dev-latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Install Helm
      uses: azure/setup-helm@v3
      with:
        version: 'latest'

    - name: Deployment Decision
      id: deploy-decision
      run: |
        echo "🎯 Version ${{ steps.version.outputs.version }} built and pushed to ECR"
        echo ""
        
        # Check if manual workflow dispatch
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          DEPLOY_ACTION="${{ github.event.inputs.deployment_action }}"
        else
          # Auto-deploy on push to develop
          DEPLOY_ACTION="deploy"
        fi
        
        echo "action=${DEPLOY_ACTION}" >> $GITHUB_OUTPUT
        
        if [ "$DEPLOY_ACTION" == "build-only" ]; then
          echo "⏹️  Deployment skipped - build only"
          echo "📦 Images are available in ECR:"
          echo "   - movienight-backend-dev-${{ steps.version.outputs.version }}"
          echo "   - movienight-frontend-dev-${{ steps.version.outputs.version }}"
        else
          echo "✅ Proceeding with deployment to dev"
        fi

    - name: Update kubeconfig
      if: steps.deploy-decision.outputs.action == 'deploy'
      run: |
        aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

    - name: Deploy with Helm
      if: steps.deploy-decision.outputs.action == 'deploy'
      run: |
        helm upgrade --install movienight ./MovieNight/helm/movienight \
          --namespace movienight-dev \
          --create-namespace \
          --values ./MovieNight/helm/movienight/values-dev.yaml \
          --set backend.image.tag=movienight-backend-dev-${{ steps.version.outputs.version }} \
          --set frontend.image.tag=movienight-frontend-dev-${{ steps.version.outputs.version }} \
          --set secrets.tmdbApiKey=${{ secrets.TMDB_API_KEY }} \
          --wait \
          --timeout 10m \
          --debug

    - name: Get deployment status
      run: |
        echo "=== Helm Release ==="
        helm list -n movienight-dev
        echo ""
        echo "=== Pods ==="
        kubectl get pods -n movienight-dev
        echo ""
        echo "=== Services ==="
        kubectl get svc -n movienight-dev
        echo ""
        echo "=== Ingress ==="
        kubectl get ingress -n movienight-dev

    - name: Get ALB URL
      run: |
        ALB_URL=$(kubectl get ingress movienight-ingress -n movienight-dev -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "pending")
        echo "🍿 MovieNight Dev deployed!"
        echo "🔗 Access URL: http://${ALB_URL}"
        echo "📊 Release: $(helm list -n movienight-dev -o json | jq -r '.[0].chart')"
        echo "🏷️  Version: ${{ steps.version.outputs.version }}""
