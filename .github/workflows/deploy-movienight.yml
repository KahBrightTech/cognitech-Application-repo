name: Build and Deploy MovieNight to EKS

on:
  push:
    branches:
      - main
    paths:
      - 'MovieNight/**'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: int-production-use1-ecs
  EKS_CLUSTER_NAME: int-production-use1-prod-novutech-eks-cluster  
  K8S_NAMESPACE: movienight
  IAM_ROLE: arn:aws:iam::271457809232:role/int-prod-OIDCGitHubRole-role

permissions:
  id-token: write   # Required for OIDC
  contents: read    # Required for checkout

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ env.IAM_ROLE }}
        role-session-name: GitHubActions-MovieNight-${{ github.run_id }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Get AWS Account ID
      id: account-id
      run: |
        echo "account_id=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_OUTPUT

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push backend image
      uses: docker/build-push-action@v5
      with:
        context: ./MovieNight/backend
        push: true
        tags: |
          ${{ steps.account-id.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:movienight-backend-${{ github.sha }}
          ${{ steps.account-id.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:movienight-backend-latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./MovieNight/frontend
        push: true
        tags: |
          ${{ steps.account-id.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:movienight-frontend-${{ github.sha }}
          ${{ steps.account-id.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:movienight-frontend-latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Install kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

    - name: Create namespace if not exists
      run: |
        kubectl create namespace ${{ env.K8S_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

    - name: Create or update secrets
      run: |
        kubectl create secret generic movienight-secrets \
          --from-literal=tmdb-api-key=${{ secrets.TMDB_API_KEY }} \
          -n ${{ env.K8S_NAMESPACE }} \
          --dry-run=client -o yaml | kubectl apply -f -

    - name: Update deployment manifests with image tags
      run: |
        export ECR_REGISTRY="${{ steps.account-id.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
        export IMAGE_TAG="${{ github.sha }}"
        
        # Update backend deployment
        sed -i "s|image:.*movienight-backend.*|image: ${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:movienight-backend-${IMAGE_TAG}|g" MovieNight/k8s/backend-deployment.yaml
        
        # Update frontend deployment
        sed -i "s|image:.*movienight-frontend.*|image: ${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:movienight-frontend-${IMAGE_TAG}|g" MovieNight/k8s/frontend-deployment.yaml

    - name: Apply Kubernetes manifests
      run: |
        kubectl apply -f MovieNight/k8s/namespace.yaml
        kubectl apply -f MovieNight/k8s/configmap.yaml
        kubectl apply -f MovieNight/k8s/backend-deployment.yaml
        kubectl apply -f MovieNight/k8s/frontend-deployment.yaml
        kubectl apply -f MovieNight/k8s/ingress.yaml
        kubectl apply -f MovieNight/k8s/hpa.yaml

    - name: Wait for rollout
      run: |
        kubectl rollout status deployment/movienight-backend -n ${{ env.K8S_NAMESPACE }} --timeout=5m
        kubectl rollout status deployment/movienight-frontend -n ${{ env.K8S_NAMESPACE }} --timeout=5m

    - name: Get deployment status
      run: |
        echo "=== Deployment Status ==="
        kubectl get pods -n ${{ env.K8S_NAMESPACE }}
        echo ""
        echo "=== Services ==="
        kubectl get svc -n ${{ env.K8S_NAMESPACE }}
        echo ""
        echo "=== Ingress ==="
        kubectl get ingress -n ${{ env.K8S_NAMESPACE }}

    - name: Get ALB URL
      run: |
        ALB_URL=$(kubectl get ingress movienight-ingress -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "pending")
        echo "🍿 MovieNight deployed!"
        echo "🔗 Access URL: http://${ALB_URL}"
