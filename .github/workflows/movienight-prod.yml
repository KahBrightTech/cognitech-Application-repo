name: Deploy MovieNight to Production (Helm)

on:
  push:
    branches:
      - main
    paths:
      - 'MovieNight/**'
      - '.github/workflows/movienight-prod.yml'
  workflow_dispatch:
    inputs:
      deployment_action:
        description: 'Deployment action'
        required: true
        type: choice
        options:
          - deploy
          - build-only
        default: 'deploy'

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: int-production-use1-ecs
  EKS_CLUSTER_NAME: int-production-use1-prod-novutech-eks-cluster
  K8S_NAMESPACE: movienight
  IAM_ROLE: arn:aws:iam::271457809232:role/int-prod-OIDCGitHubRole-role
  ENVIRONMENT: production

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    name: Build and Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ env.IAM_ROLE }}
        role-session-name: GitHubActions-MovieNight-Prod-${{ github.run_id }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Get AWS Account ID
      id: account-id
      run: |
        echo "account_id=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_OUTPUT

    - name: Get latest version from ECR and auto-increment
      id: version
      run: |
        echo "🔍 Checking latest version in ECR..."
        
        # Get all version tags from ECR for backend
        VERSIONS=$(aws ecr describe-images \
          --repository-name ${{ env.ECR_REPOSITORY }} \
          --region ${{ env.AWS_REGION }} \
          --query 'imageDetails[*].imageTags[]' \
          --output text | tr '\t' '\n' | grep -E '^movienight-backend-v[0-9]+\.[0-9]+\.[0-9]+$' | sed 's/movienight-backend-v//' || echo "")
        
        if [ -z "$VERSIONS" ]; then
          # No versions found, start with v1.0.0
          NEW_VERSION="v1.0.0"
          echo "📌 No previous versions found. Starting with ${NEW_VERSION}"
        else
          # Get the latest version
          LATEST_VERSION=$(echo "$VERSIONS" | sort -V | tail -n 1)
          echo "📌 Latest version: v${LATEST_VERSION}"
          
          # Parse version components
          MAJOR=$(echo $LATEST_VERSION | cut -d. -f1)
          MINOR=$(echo $LATEST_VERSION | cut -d. -f2)
          PATCH=$(echo $LATEST_VERSION | cut -d. -f3)
          
          # Increment patch version
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="v${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "🚀 Auto-incrementing to: ${NEW_VERSION}"
        fi
        
        echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
        echo "version_no_v=${NEW_VERSION#v}" >> $GITHUB_OUTPUT

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push backend image
      uses: docker/build-push-action@v5
      with:
        context: ./MovieNight/backend
        push: true
        tags: |
          ${{ steps.account-id.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:movienight-backend-${{ steps.version.outputs.version }}
          ${{ steps.account-id.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:movienight-backend-latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./MovieNight/frontend
        push: true
        tags: |
          ${{ steps.account-id.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:movienight-frontend-${{ steps.version.outputs.version }}
          ${{ steps.account-id.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:movienight-frontend-latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Install Helm
      uses: azure/setup-helm@v3
      with:
        version: 'latest'

    - name: Deployment Decision
      id: deploy-decision
      run: |
        echo "🎯 Version ${{ steps.version.outputs.version }} built and pushed to ECR"
        echo ""
        echo "Options:"
        echo "  1. Deploy to EKS cluster"
        echo "  2. Terminate (skip deployment)"
        echo ""
        
        # Check if manual workflow dispatch
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          DEPLOY_ACTION="${{ github.event.inputs.deployment_action }}"
        else
          # Auto-deploy on push to main
          DEPLOY_ACTION="deploy"
        fi
        
        echo "action=${DEPLOY_ACTION}" >> $GITHUB_OUTPUT
        
        if [ "$DEPLOY_ACTION" == "build-only" ]; then
          echo "⏹️  Deployment skipped - build only"
          echo "📦 Images are available in ECR:"
          echo "   - movienight-backend-${{ steps.version.outputs.version }}"
          echo "   - movienight-frontend-${{ steps.version.outputs.version }}"
        else
          echo "✅ Proceeding with deployment to production"
        fi

    - name: Update kubeconfig
      if: steps.deploy-decision.outputs.action == 'deploy'
      run: |
        aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

    - name: Backup current release
      if: steps.deploy-decision.outputs.action == 'deploy'
      run: |
        helm get values movienight -n ${{ env.K8S_NAMESPACE }} > /tmp/previous-values.yaml || echo "No previous release"

    - name: Deploy with Helm
      if: steps.deploy-decision.outputs.action == 'deploy'
      run: |
        helm upgrade --install movienight ./MovieNight/helm/movienight \
          --namespace ${{ env.K8S_NAMESPACE }} \
          --create-namespace \
          --values ./MovieNight/helm/movienight/values-prod.yaml \
          --set backend.image.tag=movienight-backend-${{ steps.version.outputs.version }} \
          --set frontend.image.tag=movienight-frontend-${{ steps.version.outputs.version }} \
          --set secrets.tmdbApiKey=${{ secrets.TMDB_API_KEY }} \
          --wait \
          --timeout 15m \
          --atomic \
          --debug

    - name: Verify deployment
      if: steps.deploy-decision.outputs.action == 'deploy'
      run: |
        echo "=== Helm Release ==="
        helm list -n ${{ env.K8S_NAMESPACE }}
        echo ""
        echo "=== Deployment History ==="
        helm history movienight -n ${{ env.K8S_NAMESPACE }}
        echo ""
        echo "=== Pods ==="
        kubectl get pods -n ${{ env.K8S_NAMESPACE }}
        echo ""
        echo "=== Services ==="
        kubectl get svc -n ${{ env.K8S_NAMESPACE }}
        echo ""
        echo "=== Ingress ==="
        kubectl get ingress -n ${{ env.K8S_NAMESPACE }}

    - name: Run smoke tests
      if: steps.deploy-decision.outputs.action == 'deploy'
      run: |
        echo "Running smoke tests..."
        ALB_URL=$(kubectl get ingress movienight-ingress -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
        
        # Test backend health
        echo "Testing backend health..."
        curl -f http://${ALB_URL}/api/health || exit 1
        
        # Test frontend
        echo "Testing frontend..."
        curl -f http://${ALB_URL}/ || exit 1
        
        echo "✅ Smoke tests passed!"

    - name: Get ALB URL
      if: steps.deploy-decision.outputs.action == 'deploy'
      run: |
        ALB_URL=$(kubectl get ingress movienight-ingress -n ${{ env.K8S_NAMESPACE }} -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
        echo "🍿 MovieNight Production deployed!"
        echo "🔗 Access URL: http://${ALB_URL}"
        echo "📊 Release: $(helm list -n ${{ env.K8S_NAMESPACE }} -o json | jq -r '.[0].chart')"
        echo "🚀 Revision: $(helm list -n ${{ env.K8S_NAMESPACE }} -o json | jq -r '.[0].revision')"
        echo "🏷️  Version: ${{ steps.version.outputs.version }}"
        echo "📦 Images:"
        echo "   - movienight-backend-${{ steps.version.outputs.version }}"
        echo "   - movienight-frontend-${{ steps.version.outputs.version }}"
    
    - name: Summary
      run: |
        echo "📋 Build Summary"
        echo "================="
        echo "Version: ${{ steps.version.outputs.version }}"
        echo "Action: ${{ steps.deploy-decision.outputs.action }}"
        echo "Backend Image: movienight-backend-${{ steps.version.outputs.version }}"
        echo "Frontend Image: movienight-frontend-${{ steps.version.outputs.version }}"
        echo ""
        if [ "${{ steps.deploy-decision.outputs.action }}" == "build-only" ]; then
          echo "⏹️  Deployment was skipped"
          echo "📦 Images are ready in ECR for manual deployment"
        else
          echo "✅ Deployment completed successfully"
        fi

    - name: Rollback on failure
      if: failure() && steps.deploy-decision.outputs.action == 'deploy'
      run: |
        echo "❌ Deployment failed! Rolling back..."
        helm rollback movienight -n ${{ env.K8S_NAMESPACE }}
