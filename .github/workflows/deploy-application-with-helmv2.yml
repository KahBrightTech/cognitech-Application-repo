name: Deploy-application-with-helm-v2

# =============================================================================
# Generic Helm deployment workflow.
#
# All deployment values are provided manually.
# The workflow does not derive image tags and does not modify the chart path.
# =============================================================================

on:
  workflow_dispatch:
    inputs:
      chart_path:
        description: 'Exact path to the Helm chart directory containing Chart.yaml ex LittleDoctorUpdate/little-doctor-academy/helm'
        required: true
        type: string

      release_name:
        description: 'Helm release name'
        required: true
        type: string

      namespace:
        description: 'Existing target Kubernetes namespace'
        required: true
        type: string

      include_backend:
        description: 'Deploy the backend component'
        required: false
        type: boolean
        default: false

      backend_tag:
        description: 'Exact backend ECR image tag'
        required: false
        type: string
        default: ''

      include_frontend:
        description: 'Deploy the frontend component'
        required: false
        type: boolean
        default: true

      frontend_tag:
        description: 'Exact frontend ECR image tag'
        required: false
        type: string
        default: 'littledoctor-little-doctor-academy-v1.0.1'

      values_file:
        description: 'Optional values file relative to the repository root'
        required: false
        type: string
        default: ''

      action:
        description: 'Deployment action'
        required: true
        type: choice
        options:
          - deploy
          - rollback
          - uninstall
        default: deploy

      dry_run:
        description: 'Render the Helm deployment without applying it'
        required: false
        type: boolean
        default: false

      aws_region:
        description: 'AWS region'
        required: true
        type: string
        default: 'us-east-1'

      ecr_repository:
        description: 'Exact Amazon ECR repository name'
        required: true
        type: string
        default: 'int-production-use1-ecs'

      image_registry:
        description: 'Exact Amazon ECR registry hostname'
        required: true
        type: string
        default: '271457809232.dkr.ecr.us-east-1.amazonaws.com'

      eks_cluster:
        description: 'Exact target Amazon EKS cluster name'
        required: true
        type: string
        default: 'int-production-use1-prod-novutech-eks-cluster'

      iam_role:
        description: 'Exact IAM role ARN assumed through GitHub OIDC'
        required: true
        type: string
        default: 'arn:aws:iam::271457809232:role/int-prod-OIDCGitHubRole-role'

env:
  AWS_REGION: ${{ inputs.aws_region }}
  ECR_REPOSITORY: ${{ inputs.ecr_repository }}
  IMAGE_REGISTRY: ${{ inputs.image_registry }}
  EKS_CLUSTER_NAME: ${{ inputs.eks_cluster }}
  IAM_ROLE: ${{ inputs.iam_role }}
  CHART_PATH: ${{ inputs.chart_path }}
  BACKEND_TAG: ${{ inputs.backend_tag }}
  FRONTEND_TAG: ${{ inputs.frontend_tag }}

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: ${{ inputs.action }} ${{ inputs.release_name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate manual inputs
        shell: bash
        run: |
          set -euo pipefail

          echo "Chart path: ${CHART_PATH}"
          echo "Release name: ${{ inputs.release_name }}"
          echo "Namespace: ${{ inputs.namespace }}"
          echo "ECR repository: ${ECR_REPOSITORY}"
          echo "Image registry: ${IMAGE_REGISTRY}"

          if [[ "${{ inputs.action }}" == "deploy" ]]; then
            if [[ ! -f "${CHART_PATH}/Chart.yaml" ]]; then
              echo "Chart.yaml was not found at ${CHART_PATH}/Chart.yaml"
              echo
              echo "Available Chart.yaml files:"
              find . -type f -name Chart.yaml -print || true
              exit 1
            fi

            if [[ "${{ inputs.include_backend }}" == "true" && -z "${BACKEND_TAG}" ]]; then
              echo "backend_tag is required when include_backend is enabled."
              exit 1
            fi

            if [[ "${{ inputs.include_frontend }}" == "true" && -z "${FRONTEND_TAG}" ]]; then
              echo "frontend_tag is required when include_frontend is enabled."
              exit 1
            fi

            if [[ "${{ inputs.include_backend }}" != "true" && "${{ inputs.include_frontend }}" != "true" ]]; then
              echo "At least one component must be enabled."
              exit 1
            fi
          fi

          if [[ -n "${{ inputs.values_file }}" && ! -f "${{ inputs.values_file }}" ]]; then
            echo "Values file was not found: ${{ inputs.values_file }}"
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.IAM_ROLE }}
          role-session-name: GitHubActions-Helm-${{ inputs.release_name }}-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update kubeconfig
        shell: bash
        run: |
          set -euo pipefail

          aws eks update-kubeconfig \
            --name "${EKS_CLUSTER_NAME}" \
            --region "${AWS_REGION}"

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Verify images exist in ECR
        if: inputs.action == 'deploy'
        shell: bash
        run: |
          set -euo pipefail

          check_image_tag() {
            local tag="$1"

            echo "Checking exact ECR image tag: ${tag}"

            aws ecr describe-images \
              --repository-name "${ECR_REPOSITORY}" \
              --region "${AWS_REGION}" \
              --image-ids "imageTag=${tag}" \
              >/dev/null
          }

          if [[ "${{ inputs.include_backend }}" == "true" ]]; then
            check_image_tag "${BACKEND_TAG}"
          fi

          if [[ "${{ inputs.include_frontend }}" == "true" ]]; then
            check_image_tag "${FRONTEND_TAG}"
          fi

      - name: Deploy with Helm
        if: inputs.action == 'deploy'
        shell: bash
        run: |
          set -euo pipefail

          HELM_ARGS=(
            upgrade
            --install
            "${{ inputs.release_name }}"
            "${CHART_PATH}"
            --namespace "${{ inputs.namespace }}"
            --set-string "global.namespace=${{ inputs.namespace }}"
            --set-string "image.registry=${IMAGE_REGISTRY}"
            --set-string "image.repository=${ECR_REPOSITORY}"
            --wait
            --timeout 10m
          )

          if [[ "${{ inputs.include_backend }}" == "true" ]]; then
            echo "Using exact backend image tag: ${BACKEND_TAG}"
            HELM_ARGS+=(--set-string "backend.image.tag=${BACKEND_TAG}")
          fi

          if [[ "${{ inputs.include_frontend }}" == "true" ]]; then
            echo "Using exact frontend image tag: ${FRONTEND_TAG}"
            HELM_ARGS+=(--set-string "frontend.image.tag=${FRONTEND_TAG}")
          fi

          if [[ -n "${{ inputs.values_file }}" ]]; then
            HELM_ARGS+=(--values "${{ inputs.values_file }}")
          fi

          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            HELM_ARGS+=(--dry-run --debug)
          else
            HELM_ARGS+=(--rollback-on-failure)
          fi

          helm "${HELM_ARGS[@]}"

      - name: Rollback release
        if: inputs.action == 'rollback'
        shell: bash
        run: |
          set -euo pipefail

          helm rollback \
            "${{ inputs.release_name }}" \
            --namespace "${{ inputs.namespace }}" \
            --wait \
            --timeout 10m

      - name: Uninstall release
        if: inputs.action == 'uninstall'
        shell: bash
        run: |
          set -euo pipefail

          helm uninstall \
            "${{ inputs.release_name }}" \
            --namespace "${{ inputs.namespace }}" \
            --wait \
            --timeout 10m

      - name: Verify deployment
        if: inputs.action == 'deploy' && inputs.dry_run == false
        shell: bash
        run: |
          set -euo pipefail

          helm status \
            "${{ inputs.release_name }}" \
            --namespace "${{ inputs.namespace }}"

          kubectl get pods \
            --namespace "${{ inputs.namespace }}" \
            -o wide

          kubectl get services \
            --namespace "${{ inputs.namespace }}"

      - name: Summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Helm ${{ inputs.action }}: ${{ inputs.release_name }}"
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Action | \`${{ inputs.action }}\` |"
            echo "| Namespace | \`${{ inputs.namespace }}\` |"
            echo "| Chart | \`${CHART_PATH}\` |"
            echo "| ECR repository | \`${ECR_REPOSITORY}\` |"
            echo "| Image registry | \`${IMAGE_REGISTRY}\` |"
            echo "| Cluster | \`${EKS_CLUSTER_NAME}\` |"

            if [[ "${{ inputs.include_backend }}" == "true" ]]; then
              echo "| Backend tag | \`${BACKEND_TAG}\` |"
            fi

            if [[ "${{ inputs.include_frontend }}" == "true" ]]; then
              echo "| Frontend tag | \`${FRONTEND_TAG}\` |"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
