apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pulseboard-ingress
  namespace: pulseboard
  annotations:
    # AWS Load Balancer Controller annotations
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    # Uncomment if you have an SSL certificate in ACM
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:region:account-id:certificate/cert-id
    # alb.ingress.kubernetes.io/ssl-redirect: '443'
spec:
  rules:
  - host: pulseboard.example.com # Update with your domain
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: pulseboard-backend
            port:
              number: 4000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: pulseboard-frontend
            port:
              number: 80
