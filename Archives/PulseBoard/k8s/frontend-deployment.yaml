apiVersion: apps/v1
kind: Deployment
metadata:
  name: pulseboard-frontend
  namespace: pulseboard
  labels:
    app: pulseboard
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pulseboard
      component: frontend
  template:
    metadata:
      labels:
        app: pulseboard
        component: frontend
    spec:
      containers:
      - name: frontend
        image: YOUR_ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/pulseboard:frontend-latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "150m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: pulseboard-frontend
  namespace: pulseboard
  labels:
    app: pulseboard
    component: frontend
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  selector:
    app: pulseboard
    component: frontend
