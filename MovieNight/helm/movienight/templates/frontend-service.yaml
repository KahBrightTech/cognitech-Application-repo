apiVersion: v1
kind: Service
metadata:
  name: {{ include "movienight.fullname" . }}-{{ .Values.frontend.name }}
  namespace: {{ include "movienight.namespace" . }}
  labels:
    {{- include "movienight.frontend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
  - port: {{ .Values.frontend.service.port }}
    targetPort: {{ .Values.frontend.service.targetPort }}
    protocol: TCP
    name: http
  selector:
    {{- include "movienight.frontend.selectorLabels" . | nindent 4 }}
