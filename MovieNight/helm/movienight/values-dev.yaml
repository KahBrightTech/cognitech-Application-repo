# Development environment values
global:
  namespace: movienight-dev
  environment: development

backend:
  replicaCount: 1
  
  env:
    NODE_ENV: development
    CORS_ORIGIN: "http://localhost,http://movienight-dev.example.com"
  
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "250m"
  
  autoscaling:
    enabled: false

frontend:
  replicaCount: 1
  
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"
  
  autoscaling:
    enabled: false

ingress:
  hosts:
    - host: movienight-dev.example.com
      paths:
        - path: /api
          pathType: Prefix
          backend:
            service: backend
            port: 3001
        - path: /socket.io
          pathType: Prefix
          backend:
            service: backend
            port: 3001
        - path: /
          pathType: Prefix
          backend:
            service: frontend
            port: 80
