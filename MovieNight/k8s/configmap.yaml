apiVersion: v1
kind: ConfigMap
metadata:
  name: movienight-config
  namespace: movienight
data:
  # Backend configuration
  NODE_ENV: "production"
  PORT: "3001"
  CORS_ORIGIN: "http://your-domain.com" # Update with your actual domain

  # Frontend configuration
  VITE_API_URL: "http://movienight-backend:3001"
