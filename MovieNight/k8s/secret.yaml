# This is an example secret file. DO NOT commit the actual secret to git!
# Create the secret using:
# kubectl create secret generic movienight-secrets \
#   --from-literal=tmdb-api-key=YOUR_ACTUAL_API_KEY \
#   -n movienight

apiVersion: v1
kind: Secret
metadata:
  name: movienight-secrets
  namespace: movienight
type: Opaque
data:
  # Base64 encoded TMDB API key
  # Replace with: echo -n "your_api_key" | base64
  tmdb-api-key: eW91cl90bWRiX2FwaV9rZXlfaGVyZQ==
