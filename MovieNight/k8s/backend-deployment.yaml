apiVersion: apps/v1
kind: Deployment
metadata:
  name: movienight-backend
  namespace: movienight
  labels:
    app: movienight
    component: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: movienight
      component: backend
  template:
    metadata:
      labels:
        app: movienight
        component: backend
    spec:
      containers:
      - name: backend
        image: YOUR_ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/int-production-use1-ecs:movienight-backend-latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
          name: http
          protocol: TCP
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: movienight-config
              key: NODE_ENV
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: movienight-config
              key: PORT
        - name: CORS_ORIGIN
          valueFrom:
            configMapKeyRef:
              name: movienight-config
              key: CORS_ORIGIN
        - name: TMDB_API_KEY
          valueFrom:
            secretKeyRef:
              name: movienight-secrets
              key: tmdb-api-key
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: movienight-backend
  namespace: movienight
  labels:
    app: movienight
    component: backend
spec:
  type: ClusterIP
  ports:
  - port: 3001
    targetPort: 3001
    protocol: TCP
    name: http
  selector:
    app: movienight
    component: backend
  sessionAffinity: ClientIP # Important for WebSocket connections
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800 # 3 hours
