apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: movienight-ingress
  namespace: movienight
  annotations:
    # AWS ALB Ingress Controller annotations
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    # Uncomment the following lines if you have SSL certificate in ACM
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:region:account-id:certificate/cert-id
    # alb.ingress.kubernetes.io/ssl-redirect: '443'

    # WebSocket support
    alb.ingress.kubernetes.io/backend-protocol: HTTP
    alb.ingress.kubernetes.io/success-codes: 200,101
spec:
  rules:
  - host: movienight.example.com # Update with your domain
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: movienight-backend
            port:
              number: 3001
      - path: /socket.io
        pathType: Prefix
        backend:
          service:
            name: movienight-backend
            port:
              number: 3001
      - path: /
        pathType: Prefix
        backend:
          service:
            name: movienight-frontend
            port:
              number: 80
