replicaCount: 2

image:
  repository: REPLACE_ME.dkr.ecr.us-east-1.amazonaws.com/little-doctor-academy
  tag: "1.0.0"
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""

podAnnotations: {}

# Cognito pool/client the app authenticates against (see
# deploy/terraform/cognito). Injected into the container as env vars at
# startup and turned into /config/env-config.js by the container's
# entrypoint - no rebuild needed to point at a different pool.
#
# Preferred for production: create the Secret out-of-band (Terraform,
# External Secrets, `kubectl create secret`, etc.) with keys
# VITE_COGNITO_USER_POOL_ID / VITE_COGNITO_CLIENT_ID / VITE_COGNITO_REGION,
# and set existingSecret to its name. Leave existingSecret empty and this
# chart will create the Secret from the plain values below instead (fine
# for dev, but means the values live in your values file / --set history).
cognito:
  existingSecret: ""
  userPoolId: ""
  clientId: ""
  region: "us-east-1"

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: alb
  host: doctor.example.com
  certificateArn: ""
  scheme: internet-facing

resources:
  requests:
    cpu: 100m
    memory: 96Mi
  limits:
    cpu: 300m
    memory: 192Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true

nodeSelector: {}
tolerations: []
affinity: {}
