apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "little-doctor-academy.fullname" . }}
  labels:
    {{- include "little-doctor-academy.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "little-doctor-academy.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "little-doctor-academy.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        checksum/config: "v1"
        {{- if not .Values.cognito.existingSecret }}
        checksum/cognito-secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ default (include "little-doctor-academy.fullname" .) .Values.serviceAccount.name }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: web
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: VITE_COGNITO_USER_POOL_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "little-doctor-academy.cognitoSecretName" . }}
                  key: VITE_COGNITO_USER_POOL_ID
            - name: VITE_COGNITO_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "little-doctor-academy.cognitoSecretName" . }}
                  key: VITE_COGNITO_CLIENT_ID
            - name: VITE_COGNITO_REGION
              valueFrom:
                secretKeyRef:
                  name: {{ include "little-doctor-academy.cognitoSecretName" . }}
                  key: VITE_COGNITO_REGION
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp
            # readOnlyRootFilesystem means the entrypoint script can't write
            # env-config.js into the image's html dir directly - this gives
            # it a writable spot at that exact path instead.
            - name: html-config
              mountPath: /usr/share/nginx/html/config
            # nginx renders nginx.conf.template -> /etc/nginx/conf.d/default.conf
            # at startup (envsubst); needs to be writable too.
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: html-config
          emptyDir: {}
        - name: nginx-conf
          emptyDir: {}
