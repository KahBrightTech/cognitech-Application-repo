apiVersion: apps/v1
kind: Deployment
metadata:
  name: littledoctor-frontend
  namespace: "healthpath"
  labels:
    app: littledoctor
    component: frontend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: littledoctor
      component: frontend

  template:
    metadata:
      labels:
        app: littledoctor
        component: frontend

    spec:
      containers:
      - name: frontend
        image: __REGISTRY__:__FRONTEND_TAG__
        imagePullPolicy: Always

        ports:
        - name: http
          containerPort: 8080
          protocol: TCP

        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3

        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 20
          timeoutSeconds: 3
          failureThreshold: 3

        resources:
          requests:
            cpu: 25m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: littledoctor-frontend
  namespace: "healthpath"
  labels:
    app: littledoctor
    component: frontend

spec:
  type: NodePort

  selector:
    app: littledoctor
    component: frontend

  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 8080
    nodePort: 30080
